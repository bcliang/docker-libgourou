name: Build and Publish to DockerHub
on:
  release:
    types: [published]

jobs:
  publish-alpine:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/releases/')
    steps:
    - uses: actions/checkout@v6
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Docker Login - Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Create Release tag
      run: |
        echo "bcliang/docker-libgourou" > BE_NAME
        echo "${GITHUB_REF#refs/tags/releases/}-alpine" > RELEASE_TAG
    - name: Build and push the Docker image
      run: |
        docker buildx build . \
          --file Dockerfile-alpine \
          --tag $(cat BE_NAME):$(cat RELEASE_TAG) \
          --tag $(cat BE_NAME):alpine \
          --tag $(cat BE_NAME):latest \
          --sbom=true \
          --provenance=mode=max \
          --push
  publish-ubuntu:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/releases/')
    steps:
    - uses: actions/checkout@v6
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Docker Login - Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Create Release tag
      run: |
        echo "bcliang/docker-libgourou" > BE_NAME
        echo "${GITHUB_REF#refs/tags/releases/}-ubuntu" > RELEASE_TAG
    - name: Build and push the Docker image
      run: |
        docker buildx build . \
          --file Dockerfile-ubuntu \
          --tag $(cat BE_NAME):$(cat RELEASE_TAG) \
          --tag $(cat BE_NAME):ubuntu \
          --sbom=true \
          --provenance=mode=max \
          --push
